name: Build All

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version manuelle (laisser vide pour auto-incrément)"
        required: false
      notes:
        description: "Notes de release"
        required: false

jobs:
  build:
    runs-on: windows-latest

    outputs:
      VERSION: ${{ steps.setversion.outputs.VERSION }}
      TAG: ${{ steps.setversion.outputs.TAG }}
      NOTES: ${{ steps.setnotes.outputs.NOTES }}
      
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    # ---------------------------------------------------------
    # 1) Setup .NET
    # ---------------------------------------------------------
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: "8.0.x"

    # ---------------------------------------------------------
    # 2) Read input (version manuelle + notes)
    # ---------------------------------------------------------
    - name: Read input
      shell: pwsh
      run: |
        if ("${{ github.event.inputs.version }}" -ne "") {
            echo "VERSION=${{ github.event.inputs.version }}" >> $env:GITHUB_ENV
            echo "TAG=${{ github.event.inputs.version }}" >> $env:GITHUB_ENV
            Write-Host "Version manuelle détectée : ${{ github.event.inputs.version }}"
        }
        else {
            Write-Host "Aucune version manuelle, auto-incrément."
        }

    - name: Release notes
      id: notes
      shell: pwsh
      run: |
        $notes = "${{ github.event.inputs.notes }}"

        Add-Content -Path $env:GITHUB_ENV -Value "NOTES<<EOF"
        Add-Content -Path $env:GITHUB_ENV -Value $notes
        Add-Content -Path $env:GITHUB_ENV -Value "EOF"

        Write-Host "Notes de release enregistrées."

    - name: Export NOTES
      id: setnotes
      shell: pwsh
      run: |
        echo "::set-output name=NOTES::$env:NOTES"

    # ---------------------------------------------------------
    # 2) Récupérer le dernier tag existant
    # ---------------------------------------------------------
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        fetch-tags: true

    
    - name: Get latest tag
      shell: pwsh
      run: |
        try {
          $tag = git describe --tags --abbrev=0
        } catch {
          $tag = "0.0.0.0"
        }
        echo "LAST_TAG=$tag" >> $env:GITHUB_ENV
        Write-Host "Dernier tag détecté : $tag"

