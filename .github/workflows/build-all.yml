name: Build All SDRSharp Components

on:
  workflow_dispatch:

jobs:
  orchestrate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout plugin repo
        uses: actions/checkout@v4

      - name: Wait 2 minutes for RTL_433 build
        run: sleep 120

      - name: Get latest RTL_433 run ID
        run: |
          RUN_ID=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.PAT1 }}" \
            "https://api.github.com/repos/marco402/Rtl_433_dll-for-plugin-SdrSharp/actions/runs?status=completed" \
            | jq -r '.workflow_runs[0].id')

          echo "RUN_ID=$RUN_ID"
          echo "$RUN_ID" > rtl433_run_id.txt

      - name: Download RTL_433 artifacts (x86 + x64)
        run: |
          RUN_ID=$(cat rtl433_run_id.txt)

          for ARCH in x86 x64; do
            echo "=== Downloading RTL_433_${ARCH} ==="

            ZIP_URL=$(curl -s \
              -H "Authorization: Bearer ${{ secrets.PAT1 }}" \
              "https://api.github.com/repos/marco402/Rtl_433_dll-for-plugin-SdrSharp/actions/runs/$RUN_ID/artifacts" \
              | jq -r ".artifacts[] | select(.name==\"RTL_433_${ARCH}\") | .archive_download_url")

            echo "ZIP_URL=$ZIP_URL"

            curl -L \
              -H "Authorization: Bearer ${{ secrets.PAT1 }}" \
              -o rtl433_${ARCH}.zip \
              "$ZIP_URL"

            mkdir -p RTL_433_${ARCH}
            unzip rtl433_${ARCH}.zip -d RTL_433_${ARCH}
          done

      - name: Copy DLLs to plugin folders
        run: |
          mkdir -p plugin_x86 plugin_x64
          cp RTL_433_x86/*.dll plugin_x86/
          cp RTL_433_x64/*.dll plugin_x64/

      - name: Create ZIP packages
        run: |
          zip -r plugin_x86.zip plugin_x86
          zip -r plugin_x64.zip plugin_x64

      - name: Upload final artifacts
        uses: actions/upload-artifact@v4
        with:
          name: SDRSharp_plugins
          path: |
            plugin_x86.zip
            plugin_x64.zip
