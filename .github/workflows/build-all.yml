name: Build All

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Version manuelle (laisser vide pour auto-incrément)"
        required: false
        type: string
      notes:
        description: "Notes de la release"
        required: false
        type: string

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Save start time
        shell: pwsh
        run: |
          $now = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
          echo "START_TIME=$now" >> $env:GITHUB_ENV
          Write-Host "Start time saved: $now"

      - name: Debug START_TIME
        shell: pwsh
        run: |
           Write-Host "START_TIME = $env:START_TIME"
    
      # ---------------------------------------------------------
      # 1) Checkout complet (obligatoire pour créer un tag)
      # ---------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ---------------------------------------------------------
      # 2) Récupérer le dernier tag existant
      # ---------------------------------------------------------
      - name: Get latest tag
        shell: pwsh
        run: |
          try {
            $tag = git describe --tags --abbrev=0
          } catch {
            $tag = "0.0.0.0"
          }
          echo "LAST_TAG=$tag" >> $env:GITHUB_ENV
          Write-Host "Dernier tag détecté : $tag"

      # ---------------------------------------------------------
      # 3) Auto-incrément (BUILD)
      # ---------------------------------------------------------
      - name: Auto increment version
        shell: pwsh
        run: |
          $parts = $env:LAST_TAG.Split('.')
          $maj = [int]$parts[0]
          $min = [int]$parts[1]
          $pat = [int]$parts[2]
          $bld = [int]$parts[3] + 1

          $auto = "$maj.$min.$pat.$bld"
          echo "AUTO_TAG=$auto" >> $env:GITHUB_ENV
          Write-Host "Version auto-incrémentée : $auto"

      # ---------------------------------------------------------
      # 4) Choisir entre version manuelle ou auto
      # ---------------------------------------------------------
      - name: Determine final tag
        shell: pwsh
        run: |
          if ("${{ github.event.inputs.tag }}" -ne "") {
            echo "TAG=${{ github.event.inputs.tag }}" >> $env:GITHUB_ENV
            Write-Host "Version forcée : ${{ github.event.inputs.tag }}"
          } else {
            echo "TAG=$env:AUTO_TAG" >> $env:GITHUB_ENV
            Write-Host "Version finale (auto) : $env:AUTO_TAG"
          }

      # ---------------------------------------------------------
      # 5) Notes de release
      # ---------------------------------------------------------
      - name: Read notes
        shell: pwsh
        run: |
          if ("${{ github.event.inputs.notes }}" -ne "") {
            echo "NOTES=${{ github.event.inputs.notes }}" >> $env:GITHUB_ENV
          } else {
            echo "NOTES=Release automatique du plugin RTL_433." >> $env:GITHUB_ENV
          }

      - name: Trigger RTL_433 build
        shell: pwsh
        run: |
          $url = "https://api.github.com/repos/marco402/Rtl_433_dll-for-plugin-SdrSharp/actions/workflows/build.yml/dispatches"
          $body = '{"ref":"rtl_433forSDRSharp"}'

          $response = curl.exe -s -o $null -w "%{http_code}" `
            -X POST `
            -H "Authorization: Bearer ${{ secrets.PAT }}" `
            -H "Accept: application/vnd.github+json" `
            -d $body `
            $url

          Write-Host "HTTP status: $response"
          if ($response -eq "204" -or $null -eq $response) {
            Write-Host "Workflow RTL_433 déclenché avec succès."
          }
          else {
            Write-Error "Échec du déclenchement du workflow RTL_433 (HTTP $response)"
            exit 1
          }

      - name: Wait for RTL_433 artifacts
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.PAT }}
        run: |
          $headers = @{ Authorization = "Bearer $env:GH_TOKEN" }

          $start = Get-Date $env:START_TIME

          Write-Host "Recherche d'un run RTL_433 créé après $start"

          for ($i = 1; $i -le 60; $i++) {

              Write-Host "Tentative $i..."

              $runs = Invoke-RestMethod -Headers $headers `
                -Uri "https://api.github.com/repos/marco402/Rtl_433_dll-for-plugin-SdrSharp/actions/runs" `
                -Method GET

              # Trouver le run le plus récent sur la bonne branche
              $run = $runs.workflow_runs |
                Where-Object { $_.head_branch -eq "rtl_433forSDRSharp" } |
                Sort-Object created_at |
                Select-Object -Last 1

              if ($run) {
                  Write-Host "Run trouvé : $($run.id) - status=$($run.status)"

                  # Attendre qu'il soit terminé
                  if ($run.status -eq "completed") {

                      # Vérifier les artefacts
                      $artifacts = Invoke-RestMethod -Headers $headers `
                        -Uri "https://api.github.com/repos/marco402/Rtl_433_dll-for-plugin-SdrSharp/actions/runs/$($run.id)/artifacts" `
                        -Method GET

                      $count = $artifacts.artifacts.Count
                      Write-Host "Nombre d'artefacts : $count"

                      if ($count -ge 2) {
                          Write-Host "Artifacts prêts !"
                          echo "RUN_ID=$($run.id)" >> $env:GITHUB_ENV
                          exit 0
                      }
                  }
              }

              Start-Sleep -Seconds 5
          }

          Write-Error "Impossible de trouver un run RTL_433 après 60 tentatives."
          exit 1

      # ---------------------------------------------------------
      # 7) Télécharger les artefacts RTL_433
      # ---------------------------------------------------------
      - name: Download RTL_433 artifacts
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.PAT }}
        run: |
          gh run download $env:RUN_ID `
            --repo marco402/Rtl_433_dll-for-plugin-SdrSharp `
            --dir artifacts

          Write-Host "Artefacts RTL_433 téléchargés."


      # ---------------------------------------------------------
      # 8) Construire les ZIP x86/x64 du plugin
      # ---------------------------------------------------------
      - name: Build plugin ZIPs
        shell: pwsh
        run: |
          Compress-Archive -Path "artifacts\x86\*" -DestinationPath "plugin_rtl433_x86.zip"
          Compress-Archive -Path "artifacts\x64\*" -DestinationPath "plugin_rtl433_x64.zip"
          Write-Host "ZIP x86/x64 créés."

      # ---------------------------------------------------------
      # 9) Renommer les ZIP avec le tag final
      # ---------------------------------------------------------
      - name: Rename ZIPs with tag
        shell: pwsh
        run: |
          Rename-Item "plugin_rtl433_x86.zip" "plugin_rtl433_x86-$env:TAG.zip"
          Rename-Item "plugin_rtl433_x64.zip" "plugin_rtl433_x64-$env:TAG.zip"
          Write-Host "ZIP renommés avec la version $env:TAG"

      # ---------------------------------------------------------
      # 10) Créer le tag Git
      # ---------------------------------------------------------
      - name: Create Git tag
        shell: pwsh
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag $env:TAG
          git push origin $env:TAG
          Write-Host "Tag $env:TAG créé et poussé."

      # ---------------------------------------------------------
      # 11) Créer la release GitHub
      # ---------------------------------------------------------
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.TAG }}
          name: "Release RTL_433 ${{ env.TAG }}"
          body: ${{ env.NOTES }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ---------------------------------------------------------
      # 12) Upload des ZIP dans la release
      # ---------------------------------------------------------
      - name: Upload ZIPs to release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.TAG }}
          files: |
            plugin_rtl433_x86-${{ env.TAG }}.zip
            plugin_rtl433_x64-${{ env.TAG }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
