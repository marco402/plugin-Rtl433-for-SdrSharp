name: Build All SDRSharp Components

on:
  workflow_dispatch:

jobs:

  orchestrate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout plugin repo
        uses: actions/checkout@v4

      ############################################################
      # 1. Trigger RTL_433 build
      ############################################################
      - name: Trigger RTL_433 build
        run: |
          START_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          echo "$START_TIME" > rtl433_start_time.txt

          curl -s -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.PAT1 }}" \
            https://api.github.com/repos/marco402/Rtl_433_dll-for-plugin-SdrSharp/actions/workflows/build.yml/dispatches \
            -d '{"ref":"rtl_433forSDRSharp"}'

      - name: Wait 2 minutes for RTL_433 to finish
        if: success()
        run: |
           echo "Waiting 2 minutes to ensure RTL_433 artifacts are ready..."
           sleep 120
                
      - name: Get latest RTL_433 run ID
        run: |
          RTL433_RUN_ID=$(curl -s \
          -H "Accept: application/vnd.github+json" \
          -H "Authorization: Bearer ${{ secrets.PAT1 }}" \
          "https://api.github.com/repos/marco402/Rtl_433_dll-for-plugin-SdrSharp/actions/runs?status=completed" \
          | jq -r '.workflow_runs[0].id')
          
          echo "RTL433_RUN_ID=$RTL433_RUN_ID"
          echo "$RTL433_RUN_ID" > rtl433_run_id.txt
      ############################################################
       # 3. Download RTL_433_x86 artifact
      ############################################################          
      - name: Download RTL_433_x86 artifact
        run: |
          # 1. Récupérer le dernier run terminé
          RUN_ID=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.PAT1 }}" \
            "https://api.github.com/repos/marco402/Rtl_433_dll-for-plugin-SdrSharp/actions/runs?status=completed" \
           | jq -r '.workflow_runs[0].id')

          echo "RUN_ID=$RUN_ID"

          # 2. Récupérer l’URL du ZIP
          ZIP_URL=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.PAT1 }}" \
            "https://api.github.com/repos/marco402/Rtl_433_dll-for-plugin-SdrSharp/actions/runs/$RUN_ID/artifacts" \
            | jq -r '.artifacts[] | select(.name=="RTL_433_x86") | .archive_download_url')

          echo "ZIP_URL=$ZIP_URL"

          # 3. Télécharger le ZIP
          curl -L \
            -H "Authorization: Bearer ${{ secrets.PAT1 }}" \
            -o rtl433_x86.zip \
            "$ZIP_URL"
  
          # 4. Dézipper
          mkdir -p RTL_433_x86
          unzip rtl433_x86.zip -d RTL_433_x86
       ############################################################
       # 4. Download RTL_433_x64 artifact
      ############################################################          
      - name: Download RTL_433_x64 artifact
        run: |
          # 2. Récupérer l’URL du ZIP
          ZIP_URL=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.PAT1 }}" \
            "https://api.github.com/repos/marco402/Rtl_433_dll-for-plugin-SdrSharp/actions/runs/$RUN_ID/artifacts" \
            | jq -r '.artifacts[] | select(.name=="RTL_433_x64") | .archive_download_url')

          echo "ZIP_URL=$ZIP_URL"

          # 3. Télécharger le ZIP
          curl -L \
            -H "Authorization: Bearer ${{ secrets.PAT1 }}" \
            -o rtl433_x64.zip \
            "$ZIP_URL"

          # 4. Dézipper
          mkdir -p RTL_433_x64
          unzip rtl433_x64.zip -d RTL_433_x64
      ############################################################
      # 5. Assemble final packages
      ############################################################
      - name: Assemble x86
        run: |
          mkdir -p plugin_x86
          cp RTL_433_x86/*.dll plugin_x86/
          
      - name: Assemble x64
        run: |
          mkdir -p plugin_x64
          cp RTL_433_x64/*.dll plugin_x64/

      ############################################################
      # 6. ZIP + Upload
      ############################################################
      - name: Create ZIPs
        run: |
          powershell Compress-Archive -Path plugin_x86 -DestinationPath plugin_rtl433_x86.zip
          powershell Compress-Archive -Path plugin_x64 -DestinationPath plugin_rtl433_x64.zip

      - name: Upload ZIPs
        uses: actions/upload-artifact@v4
        with:
          name: plugin_rtl433_packages
          path: |
            plugin_rtl433_x86.zip
            plugin_rtl433_x64.zip
