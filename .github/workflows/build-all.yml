name: Build All SDRSharp Components

on:
  workflow_dispatch:

jobs:

  orchestrate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout plugin repo
        uses: actions/checkout@v4

      ############################################################
      # 1. Déclencher les builds dans les 2 autres dépôts
      ############################################################
      - name: Trigger RTL_433 build
        run: |
          START_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          echo "$START_TIME" > rtl433_start_time.txt

          curl -s -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.PAT }}" \
            https://api.github.com/repos/marco402/Rtl_433_dll-for-plugin-SdrSharp/actions/workflows/build.yml/dispatches \
            -d '{"ref":"rtl_433forSDRSharp"}'

      - name: Trigger GraphLib build
        run: |
             RUN=$(curl -s -X POST \
                -H "Accept: application/vnd.github+json" \
                -H "Authorization: Bearer ${{ secrets.PAT }}" \
                https://api.github.com/repos/marco402/GraphLibSpecific/actions/workflows/build.yml/dispatches \
               -d '{"ref":"main"}')
             RUN_ID=$(echo "$RUN" | jq -r '.id')
             echo "Triggered GraphLib run ID: $RUN_ID"
             
             # On enregistre l’ID dans un fichier
             echo "$RUN_ID" > graphlib_run_id.txt
             
      ############################################################
      # 2. Attendre la fin des builds
      ############################################################
      - name: Wait for RTL_433 build
        run: |
          RUN_ID=$(cat rtl433_run_id.txt)
          bash .github/scripts/wait_for_workflow.sh marco402 Rtl_433_dll-for-plugin-SdrSharp build.yml rtl_433forSDRSharp $RUN_ID

      - name: Wait for GraphLib build
        run: |
          RUN_ID=$(cat graphlib_run_id.txt)
          bash .github/scripts/wait_for_workflow.sh marco402 GraphLibSpecific build.yml main $RUN_ID

      ############################################################
      # 3. Télécharger les artefacts via API GitHub
      ############################################################
      - name: Download RTL_433 artifacts
        run: |
          bash .github/scripts/download_artifacts.sh marco402 Rtl_433_dll-for-plugin-SdrSharp RTL_433_x86
          bash .github/scripts/download_artifacts.sh marco402 Rtl_433_dll-for-plugin-SdrSharp RTL_433_x64

      - name: Download GraphLib artifacts
        run: |
          bash .github/scripts/download_artifacts.sh marco402 GraphLibSpecific GraphLib_x86
          bash .github/scripts/download_artifacts.sh marco402 GraphLibSpecific GraphLib_x64

  ############################################################
  # 4. Build plugin (Windows)
  ############################################################
  build-plugin:
    runs-on: windows-latest
    needs: orchestrate

    steps:
      - uses: actions/checkout@v4

      - uses: microsoft/setup-msbuild@v2

      - name: Build x86
        run: msbuild Rtl_433_Plugin/SDRSharp.Rtl_433.csproj /p:Configuration=CI_x86 /p:Platform=x86

      - name: Build x64
        run: msbuild Rtl_433_Plugin/SDRSharp.Rtl_433.csproj /p:Configuration=CI_x64 /p:Platform=x64

      ############################################################
      # 5. Assemblage final
      ############################################################
      - name: Assemble x86
        run: |
          mkdir plugin_x86
          copy Rtl_433_Plugin\bin\x86\CI_x86\*.dll plugin_x86\
          copy RTL_433_x86\*.dll plugin_x86\
          copy GraphLib_x86\*.dll plugin_x86\

      - name: Assemble x64
        run: |
          mkdir plugin_x64
          copy Rtl_433_Plugin\bin\x64\CI_x64\*.dll plugin_x64\
          copy RTL_433_x64\*.dll plugin_x64\
          copy GraphLib_x64\*.dll plugin_x64\

      ############################################################
      # 6. ZIP + Upload
      ############################################################
      - name: Create ZIPs
        run: |
          powershell Compress-Archive -Path plugin_x86 -DestinationPath plugin_rtl433_x86.zip
          powershell Compress-Archive -Path plugin_x64 -DestinationPath plugin_rtl433_x64.zip

      - name: Upload ZIPs
        uses: actions/upload-artifact@v4
        with:
          name: plugin_rtl433_packages
          path: |
            plugin_rtl433_x86.zip
            plugin_rtl433_x64.zip
