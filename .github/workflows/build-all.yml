name: Build All

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version manuelle (laisser vide pour auto-incrément)"
        required: false
      notes:
        description: "Notes de release"
        required: false

jobs:

  # ---------------------------------------------------------
  # 1) BUILD WINDOWS + SIGNATURE PFX
  # ---------------------------------------------------------
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      # -----------------------------------------------------
      # Version manuelle ou auto-incrément
      # -----------------------------------------------------
      - name: Read input
        shell: pwsh
        run: |
          if ("${{ github.event.inputs.version }}" -ne "") {
              echo "VERSION=${{ github.event.inputs.version }}" >> $env:GITHUB_ENV
              echo "TAG=${{ github.event.inputs.version }}" >> $env:GITHUB_ENV
              Write-Host "Version manuelle détectée : ${{ github.event.inputs.version }}"
          }
          else {
              Write-Host "Aucune version manuelle, auto-incrément."
          }

      - name: Release notes
        id: notes
        shell: pwsh
        run: |
          $notes = "${{ github.event.inputs.notes }}"
          Add-Content -Path $env:GITHUB_ENV -Value "NOTES<<EOF"
          Add-Content -Path $env:GITHUB_ENV -Value $notes
          Add-Content -Path $env:GITHUB_ENV -Value "EOF"

      # -----------------------------------------------------
      # Get last tag
      # -----------------------------------------------------
      - name: Get last tag
        id: lasttag
        shell: pwsh
        run: |
          $tag = git describe --tags --abbrev=0 2>$null
          if ($LASTEXITCODE -ne 0) { $tag = "0.0.0.0" }
          echo "LAST_TAG=$tag" >> $env:GITHUB_ENV
          Write-Host "Dernier tag trouvé : $tag"

      # -----------------------------------------------------
      # Auto-increment BUILD
      # -----------------------------------------------------
      - name: Auto-increment BUILD
        if: ${{ github.event.inputs.version == '' }}
        shell: pwsh
        run: |
          $last = $env:LAST_TAG
          $parts = $last.Split(".")
          $major = [int]$parts[0]
          $minor = [int]$parts[1]
          $patch = [int]$parts[2]
          $build = [int]$parts[3] + 1

          $new = "$major.$minor.$patch.$build"
          echo "VERSION=$new" >> $env:GITHUB_ENV
          echo "TAG=$new" >> $env:GITHUB_ENV
          Write-Host "Nouvelle version auto : $new"

      # -----------------------------------------------------
      # Build plugin
      # -----------------------------------------------------
      - name: Build plugin
        shell: pwsh
        run: |
          dotnet build plugin-Rtl433-for-SdrSharp.csproj -c Release

      # -----------------------------------------------------
      # Restore PFX
      # -----------------------------------------------------
      - name: Restore PFX
        shell: pwsh
        run: |
          $pfxPath = "$env:USERPROFILE\signcert.pfx"
          $bytes = [Convert]::FromBase64String("${{ secrets.SIGN_PFX }}")
          [IO.File]::WriteAllBytes($pfxPath, $bytes)
          Write-Host "PFX restored at $pfxPath"
          Write-Host "File exists: $(Test-Path $pfxPath)"
          Write-Host "File size: $((Get-Item $pfxPath).Length)"

      # -----------------------------------------------------
      # Import certificate
      # -----------------------------------------------------
      - name: Import certificate
        shell: pwsh
        run: |
          $pfxPath = "$env:USERPROFILE\signcert.pfx"
          certutil -f -p "${{ secrets.SIGN_PFX_PASSWORD }}" -importpfx $pfxPath NoRoot

      # -----------------------------------------------------
      # Sign DLL
      # -----------------------------------------------------
      - name: Sign DLL
        shell: pwsh
        run: |
          signtool sign `
            /f "$env:USERPROFILE\signcert.pfx" `
            /p "${{ secrets.SIGN_PFX_PASSWORD }}" `
            /tr http://timestamp.digicert.com `
            /td sha256 `
            /fd sha256 `
            bin\Release\net48\Rtl433.dll

      # -----------------------------------------------------
      # ZIP
      # -----------------------------------------------------
      - name: Create ZIP
        shell: pwsh
        run: |
          Compress-Archive -Path bin\Release\net48\* -DestinationPath plugin.zip

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-zip
          path: plugin.zip

  # ---------------------------------------------------------
  # 2) SIGNATURE COSIGN (UBUNTU)
  # ---------------------------------------------------------
  sign:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write

    steps:
      - name: Download ZIP artifact
        uses: actions/download-artifact@v4
        with:
          name: build-zip

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3.5.0

      - name: Cosign sign ZIP
        run: |
          cosign sign-blob --yes --output-signature plugin.zip.sig plugin.zip

      - name: Upload signed ZIP
        uses: actions/upload-artifact@v4
        with:
          name: signed-zip
          path: |
            plugin.zip
            plugin.zip.sig

  # ---------------------------------------------------------
  # 3) RELEASE GITHUB
  # ---------------------------------------------------------
  release:
    needs: sign
    runs-on: ubuntu-latest

    steps:
      - name: Download signed ZIP
        uses: actions/download-artifact@v4
        with:
          name: signed-zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          body: ${{ env.NOTES }}
          files: |
            plugin.zip
            plugin.zip.sig
