name: Build All SDRSharp Components

permissions:
  contents: write

on:
  workflow_dispatch:
  
    ############################################################
    # 1. Input TAG version et commentaire release
    ############################################################	  
    inputs:
      tag:
        description: "Version du plugin (ex: 0.0.0.1)"
        required: true
        type: string
      notes:
        description: "Notes de la release"
        required: true
        type: string

jobs:

  orchestrate:
    runs-on: ubuntu-latest

    steps:
      ############################################################
      # 1. Read inputs
      ############################################################		
      - name: Read inputs
        run: |
          echo "TAG=${{ github.event.inputs.tag }}" >> $GITHUB_ENV
          echo "NOTES=${{ github.event.inputs.notes }}" >> $GITHUB_ENV
    
      - name: Checkout plugin repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      ############################################################
      # 1. Save start time
      ############################################################		
      - name: Save start time
        run: |
          date -u +"%Y-%m-%dT%H:%M:%SZ" > rtl433_start_time.txt
          echo "Start time saved:"
          cat rtl433_start_time.txt

      - name: Debug START_TIME
        run: |
          echo "START_TIME contenu dans le fichier :"
          cat rtl433_start_time.txt
          
      - name: Trigger RTL_433 build
        run: |
          curl -X POST \
          -H "Authorization: Bearer ${{ secrets.PAT }}" \
          -H "Accept: application/vnd.github+json" \
          https://api.github.com/repos/marco402/Rtl_433_dll-for-plugin-SdrSharp/actions/workflows/build.yml/dispatches \
          -d '{"ref":"rtl_433forSDRSharp"}'

      ############################################################
      # 1. Trigger RTL_433 build
      ############################################################
      - name: Wait for RTL_433 artifacts
        run: |
          START_TIME=$(cat rtl433_start_time.txt)
          echo "Recherche d'un run RTL_433 créé après $START_TIME"

          for i in {1..60}; do
            echo "Tentative $i..."

            # Trouver le run créé APRÈS START_TIME et terminé
            RUN_ID=$(curl -s \
              -H "Authorization: Bearer ${{ secrets.PAT }}" \
              "https://api.github.com/repos/marco402/Rtl_433_dll-for-plugin-SdrSharp/actions/runs" \
              | jq -r --arg START "$START_TIME" '
                  .workflow_runs
                  | map(select(.created_at > $START))
                  | map(select(.status == "completed"))
                  | sort_by(.created_at)
                  | last
                  | .id
                ')

            if [ "$RUN_ID" != "null" ] && [ -n "$RUN_ID" ]; then
              echo "Run trouvé : $RUN_ID"

              # Vérifier que les artifacts existent
              ART_COUNT=$(curl -s \
                -H "Authorization: Bearer ${{ secrets.PAT }}" \
                "https://api.github.com/repos/marco402/Rtl_433_dll-for-plugin-SdrSharp/actions/runs/$RUN_ID/artifacts" \
                | jq '.artifacts | length')

              echo "Nombre d'artifacts : $ART_COUNT"

              if [ "$ART_COUNT" -ge 2 ]; then
                echo "Artifacts prêts !"
                echo "$RUN_ID" > rtl433_run_id.txt
                break
              fi
            fi

            echo "Pas encore prêts, attente 5 secondes..."
            sleep 5
          done

      ############################################################
      # 2. Download RTL_433_x86 et RTL_433_x64 artifact
      ############################################################
      - name: Download RTL_433 artifacts (x86 + x64)
        run: |
          for ARCH in x86 x64; do
            ARCH=$(echo "$ARCH" | xargs)
            # 1. Récupérer le dernier run terminé
            RUN_ID=$(curl -s \
              -H "Authorization: Bearer ${{ secrets.PAT }}" \
              "https://api.github.com/repos/marco402/Rtl_433_dll-for-plugin-SdrSharp/actions/runs?status=completed" \
             | jq -r '.workflow_runs[0].id')

            echo "RUN_ID=$RUN_ID"
            # 2. Récupérer l’URL du ZIP
            ZIP_URL=$(curl -s \
              -H "Authorization: Bearer ${{ secrets.PAT }}" \
              "https://api.github.com/repos/marco402/Rtl_433_dll-for-plugin-SdrSharp/actions/runs/$RUN_ID/artifacts" \
              | jq -r --arg ARCH "$ARCH" '.artifacts[] | select(.name == ("RTL_433_" + $ARCH)) | .archive_download_url')
 
            echo "ZIP_URL=$ZIP_URL"

            # 3. Télécharger le ZIP
            curl -L \
              -H "Authorization: Bearer ${{ secrets.PAT }}" \
              -o rtl433_${ARCH}.zip \
              "$ZIP_URL"

            # 4. Dézipper
            mkdir -p RTL_433_${ARCH}
            unzip rtl433_${ARCH}.zip -d RTL_433_${ARCH}
          done
      ############################################################
      # 3. Assemble final packages
      ############################################################
      - name: Assemble x86
        run: |
          mkdir -p plugin_x86
          cp RTL_433_x86/*.dll plugin_x86/
          
      - name: Debug list RTL_433_x86 DLLs
        run: |
          echo "Contenu du dossier plugin_x86 :"
          ls -l plugin_x86
   
      - name: Assemble x64
        run: |
          mkdir -p plugin_x64
          cp RTL_433_x64/*.dll plugin_x64/
          
      - name: Debug list RTL_433_x64 DLLs
        run: |
          echo "Contenu du dossier plugin_x64 :"
          ls -l plugin_x64
          
      ############################################################
      # 4. ZIP
      ############################################################
      - name: Create ZIPs
        run: |
          for ARCH in x86 x64; do
            echo "Traitement de RTL_433_$ARCH..." 
            
            rm -rf RTL_433_${ARCH}
            mkdir -p RTL_433_${ARCH}
            
            unzip -o rtl433_${ARCH}.zip -d RTL_433_${ARCH}

            DLL=$(find RTL_433_${ARCH} -type f -name "*.dll" | head -n 1)

            echo "DLL trouvé : $DLL"

            zip -j plugin_rtl433_${ARCH}.zip "$DLL"
          done

      - name: Rename ZIPs with tag
        run: |
          mv plugin_rtl433_x86.zip plugin_rtl433_x86-${{ env.TAG }}.zip
          mv plugin_rtl433_x64.zip plugin_rtl433_x64-${{ env.TAG }}.zip

      ############################################################
      # 5. Upload ZIP
      ############################################################
      - name: Upload ZIPs
        uses: actions/upload-artifact@v4
        with:
          name: plugin_rtl433_packages
          path: |
            plugin_rtl433_x86.zip
            plugin_rtl433_x64.zip    
            
      ############################################################
      # 5. Create Git tag
      ############################################################
      - name: Create Git tag
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git tag ${{ env.TAG }}
          git push origin ${{ env.TAG }}

      ############################################################
      # 6. Create GitHub Release
      ############################################################
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${ env.TAG }
          name: "Release RTL_433 ${ env.TAG }"
          body: ${ env.NOTES }
        env:
          GITHUB_TOKEN: ${ secrets.GITHUB_TOKEN }
          
      ############################################################
      # 6. Upload plugin_x86 and plugin_x64 to release
      ############################################################
      - name: Upload plugin_x86 and plugin_x64 to release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            plugin_rtl433_x86.zip
            plugin_rtl433_x64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
